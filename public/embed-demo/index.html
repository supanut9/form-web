<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Form Embed Demo</title>
    <style>
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #f4f4f7;
        color: #222;
      }
      header {
        background: #4f46e5;
        color: white;
        padding: 16px 24px;
      }
      header h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
      }
      header p {
        margin: 4px 0 0;
        font-size: 12px;
        opacity: 0.8;
      }
      main {
        max-width: 720px;
        margin: 24px auto;
        padding: 0 16px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .card {
        background: white;
        border-radius: 8px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        overflow: hidden;
      }
      .card h2 {
        font-size: 14px;
        font-weight: 600;
        margin: 0;
        padding: 12px 16px;
        border-bottom: 1px solid #ececf2;
        background: #fafafb;
      }
      iframe {
        display: block;
        width: 100%;
        border: 0;
        min-height: 240px;
        transition: height 0.15s ease;
      }
      pre {
        margin: 0;
        padding: 12px 16px;
        background: #1f2937;
        color: #f3f4f6;
        font-size: 11px;
        line-height: 1.5;
        max-height: 240px;
        overflow: auto;
      }
      .empty {
        padding: 12px 16px;
        font-size: 12px;
        color: #888;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Form Embed Demo</h1>
      <p>
        Loads <code>/embed/form-1</code> in an iframe and logs every
        postMessage event coming back. Resizes the iframe to match the form's
        height. Open the Network tab to watch the underlying submit go to
        form-api.
      </p>
    </header>
    <main>
      <div class="card">
        <h2>&lt;iframe&gt; — form-1</h2>
        <iframe
          id="embed"
          src="/embed/form-1"
          title="Form Embed"
          allow="clipboard-write"
        ></iframe>
      </div>
      <div class="card">
        <h2>postMessage log</h2>
        <pre id="log"><span class="empty">Waiting for messages…</span></pre>
      </div>
    </main>

    <script>
      const logEl = document.getElementById("log");
      const iframe = document.getElementById("embed");
      // Same-origin in this demo (the page is served from form-web). In a
      // cross-origin embed, callers should validate event.origin against the
      // iframe's URL origin.
      const expectedOrigin = window.location.origin;

      function log(line) {
        if (logEl.querySelector(".empty")) logEl.innerHTML = "";
        const stamp = new Date().toISOString().slice(11, 19);
        logEl.textContent += `[${stamp}] ${line}\n`;
        logEl.scrollTop = logEl.scrollHeight;
      }

      window.addEventListener("message", (event) => {
        if (event.origin !== expectedOrigin) {
          log(`(ignored msg from ${event.origin})`);
          return;
        }
        const data = event.data;
        if (!data || typeof data !== "object") return;
        log(JSON.stringify(data));

        if (data.type === "form-resize" && typeof data.height === "number") {
          iframe.style.height = data.height + 32 + "px";
        }
        if (data.type === "form-submit") {
          log(`→ submission_id=${data.submissionId}`);
        }
        if (data.type === "form-error") {
          log(`!! error: ${data.message}`);
        }
      });
    </script>
  </body>
</html>
